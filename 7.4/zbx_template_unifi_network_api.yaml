    - uuid: d42f2e59a92b4d22a52b99ee35f7ce5f
      template: 'UniFi Network API - Site'
      name: 'UniFi Network API - Site'
      groups:
        - name: 'Templates/Network devices'
      items:
        - uuid: bc7f018c55de40f6b0bdf2aa66f6d333
          name: 'Clients JSON'
          type: HTTP_AGENT
          key: clients.json
          delay: '{$ITEM_CLIENTS.JSON_UPDATE}'
          history: '0'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.data
            - type: JAVASCRIPT
              parameters:
                - |
                  var site_name = '{$SITE.NAME}'
                  var site_id = '{$SITE.ID}'
                  var obj = JSON.parse(value);

                  for (i = 0; i < Object.keys(obj).length; i++) {
                      obj[i]["site_name"] = site_name;
                      obj[i]["site_id"] = site_id;
                  }

                  return JSON.stringify(obj)
          url: 'https://{$UNIFI_NETWORK_API_ADDRESS}/proxy/network/integration/v1/sites/{HOST.HOST}/clients'
          query_fields:
            - name: limit
              value: '200'
          headers:
            - name: Accept
              value: application/json
            - name: X-API-KEY
              value: '{$UNIFI_NETWORK_API_KEY}'
        - uuid: 4fc9abbf35544c3181ba6971baa6e644
          name: 'Clients Teleport'
          type: DEPENDENT
          key: clients.teleport
          history: '{$ITEM_CLIENTS.TELEPORT_HISTORY}'
