zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 36bff6c29af64692839d077febfc7079
      name: 'Templates/Network devices'
  host_groups:
    - uuid: 2a3274d2b480417fbad7af0f60826b7c
      name: 'UniFi Network Clients'
    - uuid: c14e97985c8440eca9a4a59af495389e
      name: 'UniFi Network Devices'
    - uuid: 4c0f56220ce54f649a2a4df37d4ca0c1
      name: 'UniFi Network Sites'
  templates:
    - uuid: 8d4ea8f16d5044cf97058459be7b5f6a
      template: 'UniFi Network API'
      name: 'UniFi Network API'
      description: 'Tested with UniFi Network API (9.5.21)'
      groups:
        - name: 'Templates/Network devices'
      items:
        - uuid: c3ebff2207424f42a4e081fabe368957
          name: 'Application Version'
          type: HTTP_AGENT
          key: application.version
          delay: '{$ITEM_APPLICATION.VERSION_UPDATE}'
          history: '{$ITEM_APPLICATION.VERSION_HISTORY}'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.applicationVersion
          url: 'https://{$UNIFI_NETWORK_API_ADDRESS}/proxy/network/integration/v1/info'
          headers:
            - name: Accept
              value: application/json
            - name: X-API-KEY
              value: '{$UNIFI_NETWORK_API_KEY}'
          triggers:
            - uuid: bf3b92521aef441990f97279bfe69b24
              expression: 'change(/UniFi Network API/application.version)=1'
              name: 'Application Version Changed'
              priority: INFO
            - uuid: 96cbe8689a6d4c22b65df5e971d09506
              expression: 'nodata(/UniFi Network API/application.version,{$TRIGGER_NODATA})=1'
              name: 'No Data for {$TRIGGER_NODATA}'
              priority: HIGH
        - uuid: d6bb0983f9fe45348b4cd8e2785bd941
          name: 'Sites JSON'
          type: HTTP_AGENT
          key: sites.json
          delay: '{$ITEM_SITES.JSON_UPDATE}'
          history: '0'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.data
          url: 'https://{$UNIFI_NETWORK_API_ADDRESS}/proxy/network/integration/v1/sites'
          query_fields:
            - name: limit
              value: '200'
          headers:
            - name: Accept
              value: application/json
            - name: X-API-KEY
              value: '{$UNIFI_NETWORK_API_KEY}'
      discovery_rules:
        - uuid: 547add54b79142c29ed100b9b17182a9
          name: 'Discovery Sites'
          type: DEPENDENT
          key: discovery.sites
          host_prototypes:
            - uuid: 1a55e15794694c3dbf70993f49731617
              host: '{#ID}'
              name: 'UniFi Network - Site: "{#NAME}"'
              group_links:
                - group:
                    name: 'UniFi Network Sites'
              templates:
                - name: 'UniFi Network API - Site'
              macros:
                - macro: '{$SITE.ID}'
                  value: '{#ID}'
                  description: 'Site ID. Used by Template, DO NOT CHANGE OR DELETE.'
                - macro: '{$SITE.NAME}'
                  value: '{#NAME}'
                  description: 'Site NAME. Used by Template, DO NOT CHANGE OR DELETE.'
              tags:
                - tag: 'UniFi Network Type'
                  value: Site
          master_item:
            key: sites.json
          lld_macro_paths:
            - lld_macro: '{#ID}'
              path: $.id
            - lld_macro: '{#NAME}'
              path: $.name
      macros:
        - macro: '{$ITEM_APPLICATION.VERSION_HISTORY}'
          value: 7d
          description: 'Item ''application.version'' History'
        - macro: '{$ITEM_APPLICATION.VERSION_UPDATE}'
          value: 10m
          description: 'Item ''application.version'' Update Interval'
        - macro: '{$ITEM_SITES.JSON_UPDATE}'
          value: 1h
          description: 'Item ''sites.json'' Update Interval'
        - macro: '{$TRIGGER_NODATA}'
          value: 30m
          description: 'Trigger ''No Data'' after 30 minutes of missing data'
        - macro: '{$UNIFI_NETWORK_API_ADDRESS}'
          description: 'UniFi Network API Address or Dns Name'
        - macro: '{$UNIFI_NETWORK_API_KEY}'
          description: 'UniFi Network API Key'
    - uuid: a260fd3865014482a08fa362e5da666c
      template: 'UniFi Network API - Client'
      name: 'UniFi Network API - Client'
      groups:
        - name: 'Templates/Network devices'
      items:
        - uuid: 58d90d8d9a2b4233a47ddc93efbc1ddf
          name: 'Access Type'
          type: DEPENDENT
          key: access.type
          history: '{$ITEM_ACCESS.TYPE_HISTORY}'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.access.type
          master_item:
            key: details.json
          triggers:
            - uuid: e4d574b8ecd043498e229f21e13d703f
              expression: 'change(/UniFi Network API - Client/access.type)=1'
              name: 'Access Type Changed to "{ITEM.VALUE}"'
              priority: INFO
        - uuid: fd24bb55be60489ea004929a5c3f8f5e
          name: 'Connected At'
          type: DEPENDENT
          key: connectedAt
          history: '{$ITEM_CONNECTEDAT_HISTORY}'
          value_type: TEXT
