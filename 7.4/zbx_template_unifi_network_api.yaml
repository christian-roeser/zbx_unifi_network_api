          master_item:
            key: details.json
        - uuid: e35ced761d534e8981b399ac91a23da0
          name: 'Client Details JSON'
          type: HTTP_AGENT
          key: details.json
          delay: '{$ITEM_DETAILS.JSON_UPDATE}'
          history: '0'
          value_type: TEXT
          url: 'https://{$UNIFI_NETWORK_API_ADDRESS}/proxy/network/integration/v1/sites/{$SITE.ID}/clients/{HOST.HOST}'
          headers:
            - name: Accept
              value: application/json
            - name: X-API-KEY
              value: '{$UNIFI_NETWORK_API_KEY}'
        - uuid: baa8b864dad4479fa7c3bc9dd7aded95
          name: Id
          type: DEPENDENT
          key: id
          history: '{$ITEM_ID_HISTORY}'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.id
          master_item:
            key: details.json
        - uuid: b0cb84241e99411aa4246bd04e0eb890
          name: IP
          type: DEPENDENT
          key: ip
          history: '{$ITEM_IP_HISTORY}'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.ipAddress
          master_item:
            key: details.json
          triggers:
            - uuid: 9e628b816cbd4e5c9d7855a745052b4f
              expression: 'change(/UniFi Network API - Client/ip)=1'
              name: 'IP Changed to "{ITEM.VALUE}"'
              priority: INFO
        - uuid: b9306da7b8804938b4827e0c91c1581e
          name: Macaddress
          type: DEPENDENT
          key: macaddress
          history: '{$ITEM_MACADDRESS_HISTORY}'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.macAddress
          master_item:
            key: details.json
        - uuid: b85f21429e5c496293d428b21df73489
          name: Name
          type: DEPENDENT
          key: name
          history: '{$ITEM_NAME_HISTORY}'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.name
          master_item:
            key: details.json
        - uuid: c428b5fa78a5464e8ea64191254f2cf3
          name: Type
          type: DEPENDENT
          key: type
          history: '{$ITEM_TYPE_HISTORY}'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.type
          master_item:
            key: details.json
        - uuid: 7336b44622514630bf1d178b622190ad
          name: 'Uplink Device Id'
          type: DEPENDENT
          key: uplink.id
          history: '{$ITEM_UPLINK.ID_HISTORY}'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.uplinkDeviceId
          master_item:
            key: details.json
          triggers:
            - uuid: 7ed422acadc74126969a1eb55e457faf
              expression: 'change(/UniFi Network API - Client/uplink.id)=1'
              name: 'Uplink Device Id Changed to "{ITEM.VALUE}"'
              priority: INFO
      macros:
        - macro: '{$ITEM_ACCESS.TYPE_HISTORY}'
          value: 1h
          description: 'Item ''access.type'' History'
        - macro: '{$ITEM_CONNECTEDAT_HISTORY}'
          value: 1h
          description: 'Item ''connectedAt'' History'
        - macro: '{$ITEM_DETAILS.JSON_UPDATE}'
          value: 10m
          description: 'Item ''details.json'' Update Interval'
        - macro: '{$ITEM_ID_HISTORY}'
          value: 1h
          description: 'Item ''id'' History'
        - macro: '{$ITEM_IP_HISTORY}'
          value: 1h
          description: 'Item ''ip'' History'
        - macro: '{$ITEM_MACADDRESS_HISTORY}'
          value: 1h
          description: 'Item ''macaddress'' History'
        - macro: '{$ITEM_NAME_HISTORY}'
          value: 1h
          description: 'Item ''name'' History'
        - macro: '{$ITEM_TYPE_HISTORY}'
          value: 1h
          description: 'Item ''type'' History'
        - macro: '{$ITEM_UPLINK.ID_HISTORY}'
          value: 1h
          description: 'Item ''uplink.id'' History'
    - uuid: 9effe2d07c5d49e18a608372b170d506
      template: 'UniFi Network API - Device'
      name: 'UniFi Network API - Device'
      groups:
        - name: 'Templates/Network devices'
      items:
        - uuid: 825105a0dd3c473eaea10bf5436c1c57
          name: 'Adopted At'
          type: DEPENDENT
          key: adoptedAt
          history: '{$ITEM_ADOPTEDAT_HISTORY}'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.adoptedAt
          master_item:
            key: details.json
        - uuid: 6e0bd840a9bd46a8b9a849617322a1d1
          name: 'Configuration Id'
          type: DEPENDENT
          key: configurationId
          history: '{$ITEM_CONFIGURATIONID_HISTORY}'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.configurationId
          master_item:
            key: details.json
          triggers:
            - uuid: 8456367bfae24b2fae352d512570bb8d
              expression: 'change(/UniFi Network API - Device/configurationId)=1'
              name: 'Configuration Changed'
              priority: INFO
        - uuid: fdf8252059174ce5ab3bf4e05c1ab2bb
          name: 'Cpu Utilization'
          type: DEPENDENT
          key: cpu.utilization
          history: '{$ITEM_CPU.UTILIZATION_HISTORY}'
          value_type: FLOAT
          units: '%'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.cpuUtilizationPct
          master_item:
            key: statistics.json
          tags:
            - tag: cpu
          triggers:
            - uuid: c4c1ccfd817a4c61bb07841b5158f1c8
              expression: 'avg(/UniFi Network API - Device/cpu.utilization,#3)>{$TRIGGER_CPUUTIL_AVERAGE}'
              name: 'CPU at {ITEM.VALUE}'
              priority: AVERAGE
            - uuid: 6c8562518e8e489f8f47d1ad01e4d3d7
              expression: 'avg(/UniFi Network API - Device/cpu.utilization,#3)>{$TRIGGER_CPUUTIL_WARNING}'
              name: 'CPU at {ITEM.VALUE}'
              priority: WARNING
              dependencies:
                - name: 'CPU at {ITEM.VALUE}'
                  expression: 'avg(/UniFi Network API - Device/cpu.utilization,#3)>{$TRIGGER_CPUUTIL_AVERAGE}'
        - uuid: ec9e3591b38643099d870e217997d675
          name: 'Device Details JSON'
          type: HTTP_AGENT
          key: details.json
          delay: '{$ITEM_DETAILS.JSON_UPDATE}'
          history: '0'
          value_type: TEXT
          url: 'https://{$UNIFI_NETWORK_API_ADDRESS}/proxy/network/integration/v1/sites/{$SITE.ID}/devices/{HOST.HOST}'
          headers:
            - name: Accept
              value: application/json
            - name: X-API-KEY
              value: '{$UNIFI_NETWORK_API_KEY}'
        - uuid: 73e731f0378f45f09ccaf5a0f8247151
          name: 'Firmware Updatable'
          type: DEPENDENT
          key: firmware.updatable
          history: '{$ITEM_FIRMWARE.UPDATABLE_HISTORY}'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.firmwareUpdatable
          master_item:
            key: details.json
          tags:
            - tag: firmware
          triggers:
            - uuid: b46969310ffe4d219bfab8e67d58358f
              expression: 'last(/UniFi Network API - Device/firmware.updatable)="true"'
              name: 'New Firmware Available'
              priority: WARNING
        - uuid: d36340014dc34d61b13effc3f625f07d
          name: 'Firmware Version'
          type: DEPENDENT
          key: firmware.version
          history: '{$ITEM_FIRMWARE.VERSION_HISTORY}'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.firmwareVersion
          master_item:
            key: details.json
          tags:
            - tag: firmware
          triggers:
            - uuid: a9f13a6532544c4199049945572a175e
              expression: 'change(/UniFi Network API - Device/firmware.version)=1'
              name: 'Firmware Changed to version "{ITEM.VALUE}"'
              priority: INFO
        - uuid: e08f76ff5b614c8287e0b4bdbe7c06ea
          name: Id
          type: DEPENDENT
          key: id
          history: '{$ITEM_ID_HISTORY}'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.id
          master_item:
            key: details.json
        - uuid: 6091c4f0f34d4bcf8b5503559f6af385
          name: IP
          type: DEPENDENT
          key: ip
          history: '{$ITEM_IP_HISTORY}'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.ipAddress
          master_item:
            key: details.json
          tags:
            - tag: network
          triggers:
            - uuid: 836ee8678cb145ce80bd9c442c7139dd
              expression: 'change(/UniFi Network API - Device/ip)=1'
              name: 'IP Changed to "{ITEM.VALUE}"'
              priority: INFO
        - uuid: 15df9264a3b944cbad8c26ca42f78957
          name: 'Load Avg 1M'
          type: DEPENDENT
          key: loadAverage1Min
          history: '{$ITEM_LOADAVG_HISTORY}'
          value_type: FLOAT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.loadAverage1Min
          master_item:
            key: statistics.json
          tags:
            - tag: cpu
        - uuid: 4faeda3aac434951995a146941e2c06a
          name: 'Load Avg 5M'
          type: DEPENDENT
          key: loadAverage5Min
          history: '{$ITEM_LOADAVG_HISTORY}'
          value_type: FLOAT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.loadAverage5Min
          master_item:
            key: statistics.json
          tags:
            - tag: cpu
        - uuid: c58d771863c045f696c9ef36bb20f245
          name: 'Load Avg 15M'
          type: DEPENDENT
          key: loadAverage15Min
          history: '{$ITEM_LOADAVG_HISTORY}'
          value_type: FLOAT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.loadAverage15Min
          master_item:
            key: statistics.json
          tags:
            - tag: cpu
        - uuid: 3063632cd1ee4ccda3baf9353f21b4e2
          name: Macaddress
          type: DEPENDENT
          key: macaddress
          history: '{$ITEM_MACADDRESS_HISTORY}'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.macAddress
          master_item:
            key: details.json
        - uuid: fb9974b8b4f04f189a5c289e3ef39518
          name: 'Memory Utilization'
          type: DEPENDENT
          key: memory.utilization
          history: '{$ITEM_MEMORY.UTILIZATION_HISTORY}'
          value_type: FLOAT
          units: '%'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.memoryUtilizationPct
          master_item:
            key: statistics.json
          tags:
            - tag: memory
          triggers:
            - uuid: d92f8bac381c443a88a6af0d75949e7a
              expression: 'avg(/UniFi Network API - Device/memory.utilization,#3)>{$TRIGGER_MEMUTIL_AVERAGE}'
              name: 'Memory at {ITEM.VALUE}'
              priority: AVERAGE
            - uuid: 664553a4883d495cbb035daec58515bb
              expression: 'avg(/UniFi Network API - Device/memory.utilization,#3)>{$TRIGGER_MEMUTIL_WARNING}'
              name: 'Memory at {ITEM.VALUE}'
              priority: WARNING
              dependencies:
                - name: 'Memory at {ITEM.VALUE}'
                  expression: 'avg(/UniFi Network API - Device/memory.utilization,#3)>{$TRIGGER_MEMUTIL_AVERAGE}'
        - uuid: 74230185918d4d3e813a8aed18fc1ef6
          name: Model
          type: DEPENDENT
          key: model
          history: '{$ITEM_MODEL_HISTORY}'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.model
          master_item:
            key: details.json
        - uuid: bc4db9ab04e245edb5df8efeb84c9ce8
          name: Name
          type: DEPENDENT
          key: name
          history: '{$ITEM_NAME_HISTORY}'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.name
          master_item:
            key: details.json
          triggers:
            - uuid: d93edf2c27764224add64d2e3e8aed04
              expression: 'change(/UniFi Network API - Device/name)=1'
              name: 'Name Changed to "{ITEM.VALUE}"'
              priority: INFO
        - uuid: 5a2311233e26407db3c101808f4ef6ea
          name: 'Provisioned At'
          type: DEPENDENT
          key: provisionedAt
          history: '{$ITEM_PROVISIONEDAT_HISTORY}'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.provisionedAt
          master_item:
            key: details.json
        - uuid: 96e79913ce84422ca509cd71fd71d392
          name: State
          type: DEPENDENT
          key: state
          history: '{$ITEM_STATE_HISTORY}'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.state
          master_item:
            key: details.json
          triggers:
            - uuid: 18834a85514d43efba36c9a504bec86f
              expression: 'last(/UniFi Network API - Device/state)="OFFLINE" or last(/UniFi Network API - Device/state)="CONNECTION_INTERRUPTED" or last(/UniFi Network API - Device/state)="ISOLATED"'
              name: 'State is in "{ITEM.VALUE}"'
              priority: HIGH
            - uuid: 211320bc8f424c90ad92043ca435ea47
              expression: 'last(/UniFi Network API - Device/state)="PENDING_ADOPTION" or last(/UniFi Network API - Device/state)="DELETING"'
              name: 'State is in "{ITEM.VALUE}"'
              priority: WARNING
            - uuid: 1a32d0be09e4471394548038d99e6c55
              expression: 'last(/UniFi Network API - Device/state)="UPDATING" or last(/UniFi Network API - Device/state)="GETTING_READY"'
              name: 'State is in "{ITEM.VALUE}"'
              priority: INFO
        - uuid: 4b17b0e66d0e44028751b97f42e19e9b
          name: 'Device Statistics JSON'
          type: HTTP_AGENT
          key: statistics.json
          delay: '{$ITEM_STATISTICS.JSON_UPDATE}'
          history: '0'
          value_type: TEXT
          url: 'https://{$UNIFI_NETWORK_API_ADDRESS}/proxy/network/integration/v1/sites/{$SITE.ID}/devices/{HOST.HOST}/statistics/latest'
          headers:
            - name: Accept
              value: application/json
            - name: X-API-KEY
              value: '{$UNIFI_NETWORK_API_KEY}'
        - uuid: fe29e1a31a46429196a2571d6f4429e3
          name: 'Uplink Rx Rate'
          type: DEPENDENT
          key: uplink.rx
          history: '{$ITEM_UPLINK_HISTORY}'
          value_type: FLOAT
          units: bps
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.uplink.rxRateBps
          master_item:
            key: statistics.json
          tags:
            - tag: network
          triggers:
            - uuid: 9ea9f1aae4cb4b4dad533881688d49af
              expression: 'avg(/UniFi Network API - Device/uplink.rx,#3)>{$TRIGGER_DOWNLOAD_AVERAGE}*1000000'
              name: 'Uplink Download at {ITEM.VALUE}'
              status: DISABLED
              priority: AVERAGE
        - uuid: f71d116c83b347f690ed21ab559a7417
          name: 'Uplink Tx Rate'
          type: DEPENDENT
          key: uplink.tx
          history: '{$ITEM_UPLINK_HISTORY}'
          value_type: FLOAT
          units: bps
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.uplink.txRateBps
          master_item:
            key: statistics.json
          tags:
            - tag: network
          triggers:
            - uuid: 11160a3498d6448a8fa0bcf239967364
              expression: 'avg(/UniFi Network API - Device/uplink.tx,#3)>{$TRIGGER_UPLOAD_AVERAGE}*1000000'
              name: 'Uplink Upload at {ITEM.VALUE}'
              status: DISABLED
              priority: AVERAGE
        - uuid: 94f25b53cfa1429a843e51c8e2021f32
          name: Uptime
          type: DEPENDENT
          key: uptime
          history: '{$ITEM_UPTIME_HISTORY}'
          value_type: UNSIGNED
          units: uptime
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.uptimeSec
          master_item:
            key: statistics.json
          triggers:
            - uuid: 9484a42938aa4a87899e9e34cc16a285
              expression: 'last(/UniFi Network API - Device/uptime)<last(/UniFi Network API - Device/uptime,#2)'
              name: 'Device Rebooted, last Uptime "{ITEM.VALUE2}"'
              priority: INFO
      discovery_rules:
        - uuid: d601092ad5394965b03d1669b17d77d3
          name: 'Discovery Ports'
          type: DEPENDENT
          key: discovery.ports
          item_prototypes:
            - uuid: 5a86f0737a0e47519e41e2bcb1a11311
              name: 'Port "{#IDX}" - Connector'
              type: DEPENDENT
              key: 'port.connector[{#IDX}]'
              history: '{$ITEM_PORT.CONNECTOR_HISTORY}'
              value_type: TEXT
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.interfaces.ports[?(@.idx==''{#IDX}'')].connector'
                - type: JSONPATH
                  parameters:
                    - '$.[0]'
              master_item:
                key: details.json
              tags:
                - tag: network
                - tag: ports
            - uuid: 7a6b3424d505467c875bf8b9348b170e
              name: 'Port "{#IDX}" - Max Speed'
              type: DEPENDENT
              key: 'port.maxSpeed[{#IDX}]'
              history: '{$ITEM_PORT.MAXSPEED_HISTORY}'
              trends: '0'
              units: bps
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.interfaces.ports[?(@.idx==''{#IDX}'')].maxSpeedMbps'
                - type: JSONPATH
                  parameters:
                    - '$.[0]'
                - type: MULTIPLIER
                  parameters:
                    - '1000000'
              master_item:
                key: details.json
              tags:
                - tag: network
                - tag: ports
            - uuid: 417bb8e4137247589f087e35fe4bcc87
              name: 'Port "{#IDX}" - Poe Enabled'
              type: DEPENDENT
              key: 'port.poe.enabled[{#IDX}]'
              history: '{$ITEM_PORT.POE.ENABLED_HISTORY}'
              value_type: TEXT
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.interfaces.ports[?(@.idx==''{#IDX}'')].poe.enabled'
                - type: JSONPATH
                  parameters:
                    - '$.[0]'
              master_item:
